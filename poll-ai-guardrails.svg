<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-label="Abstract AI guardrails visual">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061019"/>
      <stop offset="0.52" stop-color="#09130f"/>
      <stop offset="1" stop-color="#020403"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="32%" r="64%">
      <stop offset="0" stop-color="#5bc7ff" stop-opacity="0.32"/>
      <stop offset="0.48" stop-color="#20ff83" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#5bc7ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#1b3a47" stroke-opacity="0.34" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
  <rect width="1200" height="820" fill="url(#grid)"/>
  <rect width="1200" height="820" fill="url(#glow)"/>

  <g transform="translate(710 132)" opacity="0.88" filter="url(#softGlow)">
    <path d="M190 0l190 76v156c0 122-78 232-190 272C78 464 0 354 0 232V76L190 0z" fill="none" stroke="#5bc7ff" stroke-width="4" stroke-opacity="0.75"/>
    <path d="M90 248l70 70L306 158" fill="none" stroke="#20ff83" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M190 34v434M42 106l296 296M338 106L42 402" stroke="#5bc7ff" stroke-width="1.4" stroke-opacity="0.22"/>
    <circle cx="190" cy="34" r="7" fill="#5bc7ff"/>
    <circle cx="42" cy="106" r="7" fill="#5bc7ff"/>
    <circle cx="338" cy="106" r="7" fill="#5bc7ff"/>
    <circle cx="190" cy="468" r="7" fill="#5bc7ff"/>
  </g>

  <g transform="translate(108 230)">
    <text x="0" y="0" font-family="Inter, Outfit, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#20ff83">AMP IT</text>
    <text x="0" y="68" font-family="Inter, Outfit, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#f5f7f5">AI with</text>
    <text x="0" y="130" font-family="Inter, Outfit, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#f5f7f5">guardrails.</text>
    <path d="M0 172H322" stroke="#20ff83" stroke-width="2" stroke-opacity="0.75"/>
    <text x="0" y="226" font-family="Inter, Outfit, Arial, sans-serif" font-size="26" fill="#a8b8ad">Move faster without exposing</text>
    <text x="0" y="262" font-family="Inter, Outfit, Arial, sans-serif" font-size="26" fill="#a8b8ad">client data, credentials, or</text>
    <text x="0" y="298" font-family="Inter, Outfit, Arial, sans-serif" font-size="26" fill="#a8b8ad">business workflows.</text>
  </g>
</svg>
