<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-label="Abstract human-led support visual">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07120b"/>
      <stop offset="0.52" stop-color="#0b1510"/>
      <stop offset="1" stop-color="#020403"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="34%" r="62%">
      <stop offset="0" stop-color="#20ff83" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#20ff83" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#20ff83" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#1c3a28" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="820" fill="url(#bg)"/>
  <rect width="1200" height="820" fill="url(#grid)"/>
  <rect width="1200" height="820" fill="url(#glow)"/>

  <g opacity="0.82" filter="url(#softGlow)">
    <circle cx="372" cy="328" r="134" fill="none" stroke="#20ff83" stroke-width="3" stroke-opacity="0.75"/>
    <circle cx="372" cy="328" r="92" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.38"/>
    <circle cx="372" cy="328" r="20" fill="#20ff83" opacity="0.95"/>
    <path d="M372 194v-76M372 538v-76M506 328h94M144 328h94M467 233l66-66M211 489l66-66M467 423l66 66M211 167l66 66" stroke="#20ff83" stroke-width="2" stroke-linecap="round" stroke-opacity="0.72"/>
    <circle cx="372" cy="118" r="8" fill="#20ff83"/>
    <circle cx="600" cy="328" r="8" fill="#20ff83"/>
    <circle cx="533" cy="167" r="8" fill="#20ff83"/>
    <circle cx="533" cy="489" r="8" fill="#20ff83"/>
  </g>

  <g transform="translate(690 230)">
    <text x="0" y="0" font-family="Inter, Outfit, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="4" fill="#20ff83">AMP IT</text>
    <text x="0" y="68" font-family="Inter, Outfit, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#f5f7f5">Human-led</text>
    <text x="0" y="130" font-family="Inter, Outfit, Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="-2" fill="#f5f7f5">support.</text>
    <path d="M0 172H316" stroke="#20ff83" stroke-width="2" stroke-opacity="0.75"/>
    <text x="0" y="226" font-family="Inter, Outfit, Arial, sans-serif" font-size="26" fill="#a8b8ad">A real team that picks up,</text>
    <text x="0" y="262" font-family="Inter, Outfit, Arial, sans-serif" font-size="26" fill="#a8b8ad">owns the issue, and keeps</text>
    <text x="0" y="298" font-family="Inter, Outfit, Arial, sans-serif" font-size="26" fill="#a8b8ad">your business moving.</text>
  </g>
</svg>
